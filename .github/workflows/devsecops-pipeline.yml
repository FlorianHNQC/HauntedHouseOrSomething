name: Pipeline DevSecOps - Maison Epouvante

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  integration-et-tests:
    name: Build, Tests et Scan Securite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./service-communaute
    steps:
      - name: Recuperation du code
        uses: actions/checkout@v3

      - name: Configuration de Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './service-communaute/package-lock.json'

      - name: Installation des dependances
        run: npm ci

      - name: Build de l'application NestJS
        run: npm run build

      - name: Execution des Tests (Unitaires et E2E)
        run: npm run test

      - name: Audit de Securite (SCA)
        run: npm audit --audit-level=high

  packaging-docker:
    name: Creation de l'Image Docker
    needs: integration-et-tests
    runs-on: ubuntu-latest
    steps:
      - name: Recuperation du code
        uses: actions/checkout@v3

      - name: Build de l'image Docker
        run: docker build -t maison-epouvante-api:latest ./service-communaute