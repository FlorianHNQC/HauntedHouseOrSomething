name: Pipeline DevSecOps - Maison Epouvante

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  integration-et-tests:
    name: Build, Tests et Scan Sécurité
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./service-communaute
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v3

      - name: ⚙️ Configuration de Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './service-communaute/package-lock.json'

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🏗️ Build de l'application NestJS
        run: npm run build

      - name: ✅ Exécution des Tests (Unitaires & E2E)
        run: npm run test

      - name: 🛡️ Audit de Sécurité (SCA - npm audit)
        run: npm audit --audit-level=high

  packaging-docker:
    name: Création de l'Image Docker
    needs: integration-et-tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v3

      - name: 🐳 Build de l'image Docker
        run: docker build -t maison-epouvante-api:latest ./service-communaute